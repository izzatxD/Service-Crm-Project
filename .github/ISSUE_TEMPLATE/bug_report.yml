name: Bug report
description: Report a functional bug with clear reproduction steps
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend API
        - Frontend UI
        - Auth / Access
        - Orders
        - Finance
        - Inventory
        - Dashboard
        - DevOps / CI
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the problem
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: local / staging / production

  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Logs, screenshots, API response, or other context
